<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometri Hesaplayıcı</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; cursor: pointer; font-weight: bold; }
        #result { margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Geometri Alan Hesaplama</h2>
        <label for="shape">Şekil Seçin:</label>
        <select id="shape" onchange="toggleInputs()">
            <option value="square">Kare</option>
            <option value="circle">Daire</option>
        </select>

        <div id="squareInput">
            <label for="side">Kenar Uzunluğu:</label>
            <input type="number" id="side" value="5">
        </div>

        <div id="circleInput" style="display:none;">
            <label for="radius">Yarıçap:</label>
            <input type="number" id="radius" value="5">
        </div>

        <button onclick="calculate()">Hesapla</button>
        <div id="result"></div>
    </div>

    <script>
        function toggleInputs() {
            const shape = document.getElementById('shape').value;
            document.getElementById('squareInput').style.display = shape === 'square' ? 'block' : 'none';
            document.getElementById('circleInput').style.display = shape === 'circle' ? 'block' : 'none';
        }

        async function calculate() {
            const shape = document.getElementById('shape').value;
            let payload = { shape: shape };

            if (shape === 'square') {
                payload.side = document.getElementById('side').value;
            } else {
                payload.radius = document.getElementById('radius').value;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Hesaplanıyor...";

            try {
                // DIKKAT: Aşağıdaki tırnak içerisine 1. Adımda kopyaladığınız kendi Azure Function URL'nizi yapıştırın!
                const response = await fetch('https://geometry-calc-backend-dcy-b0cjdkb2bdb6c0fc.swedencentral-01.azurewebsites.net/api/CalculateArea', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.result !== undefined) {
                    resultDiv.innerText = `Sonuç: ${data.result}`;
                } else {
                    resultDiv.innerText = `Hata: ${data.error}`;
                }
            } catch (error) {
                resultDiv.innerText = "API bağlantı hatası oluştu.";
            }
        }
    </script>
</body>
</html>
